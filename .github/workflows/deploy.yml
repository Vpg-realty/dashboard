name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # Low-frequency self-heal backup ONLY. The real refresh cadence comes from
    # pinger.yml (a single in-job loop firing every 15 min). We deliberately
    # keep this sparse: GitHub Pages soft-limits publishes to ~10/hr, and the
    # old every-2-min pair of crons + the 5-min pinger stacked up to 30–60
    # deploys/hr, which tripped the limit and froze the live site (builds went
    # green but Pages stopped publishing). One backup tick every 30 min is
    # plenty to recover if the pinger loop ever dies.
    - cron: '*/30 * * * *'
  # Manual button + external pinger via REST API:
  #   curl -X POST -H "Authorization: Bearer <pat>" \
  #        -H "Accept: application/vnd.github+json" \
  #        https://api.github.com/repos/Vpg-realty/dashboard/dispatches \
  #        -d '{"event_type":"refresh"}'
  workflow_dispatch: {}
  repository_dispatch:
    types: [refresh]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time, but NEVER cancel an in-flight one. Cancelling a
# run mid-publish was leaving the github-pages environment wedged (the symptom
# that froze the live site). Deploys take ~40s, so at our cadence overlaps are
# rare; when they happen we let the running publish finish and queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Luke + the VPG team are in Pacific. Running the build under PT means
    # every `new Date()` in aggregate.js + snapshot.js (today, week start,
    # month start) lines up with what Luke sees in GHL — no 7-hour drift
    # at midnight that would mislabel yesterday's late activity as "today"
    # or fire the Monday weekly reset on Sunday afternoon PT.
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Pull live snapshot from GHL
        env:
          # Legacy single-blob secret holding the original 13 PITs as JSON.
          GHL_TOKENS: ${{ secrets.GHL_TOKENS }}
          # All secrets passed as JSON so build-snapshot.mjs can pick up
          # PIT_<base32(locationId)> secrets written by the in-app
          # Sub-Accounts panel. New sub-accounts added by Luke through the
          # dashboard land here automatically on the next deploy.
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: npm run snapshot

      - name: Append today's totals to rolling history
        run: npm run append-history

      - name: Build static site
        env:
          VITE_BASE: /dashboard/
          VITE_USE_LIVE: '1'
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
