name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # GitHub Actions cron is documented as best-effort and routinely delays
    # high-frequency schedules to 30–60 min on quiet public repos. We register
    # two offset schedules — GitHub treats each as an independent trigger —
    # to squeeze closer to actual every-2-min firing.
    - cron: '*/2 * * * *'
    - cron: '1-59/2 * * * *'
  # Manual button + external pinger via REST API:
  #   curl -X POST -H "Authorization: Bearer <pat>" \
  #        -H "Accept: application/vnd.github+json" \
  #        https://api.github.com/repos/Vpg-realty/dashboard/dispatches \
  #        -d '{"event_type":"refresh"}'
  workflow_dispatch: {}
  repository_dispatch:
    types: [refresh]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Newer cron firings supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Pull live snapshot from GHL
        env:
          GHL_TOKENS: ${{ secrets.GHL_TOKENS }}
        run: npm run snapshot

      - name: Build static site
        env:
          VITE_BASE: /dashboard/
          VITE_USE_LIVE: '1'
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
