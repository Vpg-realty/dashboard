name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # Refresh every 2 min so the TV stays close to real-time.
    # GitHub Actions cron is best-effort (it can drift up to ~5 min during
    # platform-wide high load), but on a public repo this generally fires
    # every 2 min. Each run is ~30s; minutes are unlimited for public repos.
    - cron: '*/2 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Newer cron firings supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Pull live snapshot from GHL
        env:
          GHL_TOKENS: ${{ secrets.GHL_TOKENS }}
        run: npm run snapshot

      - name: Build static site
        env:
          VITE_BASE: /dashboard/
          VITE_USE_LIVE: '1'
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
